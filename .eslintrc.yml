env:
  node: true
  es2021: true
extends: standard-with-typescript
overrides: []
parserOptions:
  ecmaVersion: latest
  sourceType: module
rules: {
  "indent": [
    "error",
    4
  ],
  "linebreak-style": [
    "error",
    "unix"
  ],

  "quotes": [
    "error",
    "single"
  ],
  "semi": [
    "error",
    "always"
  ]

  "no-console": [
      0
  ]
}
